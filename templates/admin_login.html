{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 500px; padding: 6rem 0; margin-top: 5rem; margin-bottom: 5rem;">
    <div class="card shadow-lg border-0" style="border-radius: 12px; overflow: hidden;">
        <div class="card-header text-dark text-center py-4" style="background: rgba(235, 222, 202, 0.96); border-bottom: 4px solid var(--accent-gold);">
            <h3 class="mb-0" style="color: var(--primary-dark);"><i class="fas fa-lock" style="color: var(--accent-gold);"></i> Admin Access</h3>
        </div>
        <div class="card-body p-4 p-md-5">

            <form method="POST">
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold">Admin Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                    <div class="form-text mt-2 text-muted">Contact your administrator if you have forgotten your password.</div>
                </div>
                <button type="submit" class="btn w-100" style="background: rgba(235, 222, 202, 0.96); color: var(--primary-dark); padding: 0.8rem; font-weight: 700; font-size: 1.1rem; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1);">Login to Dashboard</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
