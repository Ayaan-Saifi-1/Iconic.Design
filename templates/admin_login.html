{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 500px; padding: 6rem 0; margin-top: 5rem; margin-bottom: 5rem;">
    <div class="card shadow-lg border-0" style="border-radius: 12px; overflow: hidden;">
        <div class="card-header text-white text-center py-4" style="background: linear-gradient(135deg, #0f1e3c 0%, #1e40af 100%); border-bottom: 4px solid #d4af37;">
            <h3 class="mb-0"><i class="fas fa-lock"></i> Admin Access</h3>
        </div>
        <div class="card-body p-4 p-md-5">

            <form method="POST">
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold">Admin Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                    <div class="form-text mt-2">Default password is <code>iconic123</code></div>
                </div>
                <button type="submit" class="btn w-100" style="background: #1e40af; color: white; padding: 0.8rem; font-weight: 600; font-size: 1.1rem; border-radius: 8px;">Login to Dashboard</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
